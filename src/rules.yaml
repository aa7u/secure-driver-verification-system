rules:
  - name: Unsigned System32 Driver
    description: Flag any unsigned driver located inside System32 drivers directory
    condition:
      signature: unsigned
      path_contains: "system32\\drivers"
    severity: CRITICAL
    deduction: 60

  - name: High Entropy Driver Detection
    description: Flag potential packed or encrypted kernel binaries
    condition:
      min_entropy: 7.2
    severity: HIGH
    deduction: 30

  - name: Suspicious Test Driver Name
    description: Flag drivers containing test or debug naming conventions
    condition:
      name_contains: ["test", "debug", "sample"]
    severity: MEDIUM
    deduction: 25